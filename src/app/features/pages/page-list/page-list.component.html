<mat-card class="page-list-card">
  <div class="list-toolbar">
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search pages...</mat-label>
      <input matInput (input)="onSearch($event)" placeholder="Name or route path" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Status</mat-label>
      <mat-select (selectionChange)="onStatusFilter($event.value)" [value]="null">
        <mat-option [value]="null">All</mat-option>
        <mat-option [value]="true">Active</mat-option>
        <mat-option [value]="false">Inactive</mat-option>
      </mat-select>
    </mat-form-field>

    <span class="toolbar-spacer"></span>

    <button mat-raised-button color="primary" routerLink="/admin/pages/new">
      <mat-icon>add</mat-icon>
      Create Page
    </button>
  </div>

  @if (isLoading()) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  <table mat-table [dataSource]="items()" class="page-table">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let page">{{ page.name }}</td>
    </ng-container>

    <ng-container matColumnDef="route_path">
      <th mat-header-cell *matHeaderCellDef>Route Path</th>
      <td mat-cell *matCellDef="let page">
        <code>{{ page.route_path }}</code>
      </td>
    </ng-container>

    <ng-container matColumnDef="display_order">
      <th mat-header-cell *matHeaderCellDef>Order</th>
      <td mat-cell *matCellDef="let page">{{ page.display_order }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let page">
        <mat-chip [color]="page.is_active ? 'primary' : 'warn'" highlighted>
          {{ page.is_active ? 'Active' : 'Inactive' }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let page" class="actions-cell">
        <button mat-icon-button color="primary" [routerLink]="['/admin/pages', page.id, 'edit']">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="handleDelete(page)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      *matRowDef="let row; columns: displayedColumns"
      [class.inactive-row]="!row.is_active"
    ></tr>
  </table>

  <mat-paginator
    [length]="totalItems()"
    [pageSize]="pageSize()"
    [pageIndex]="currentPage() - 1"
    [pageSizeOptions]="[5, 10, 15, 25]"
    (page)="onPageChange($event)"
    showFirstLastButtons
  ></mat-paginator>
</mat-card>
