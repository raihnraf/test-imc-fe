<div class="list-page">
  <div class="page-header">
    <h2 class="page-title">Pages</h2>
  </div>

  <div class="filter-bar">
    <div class="filter-left">
      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix class="search-icon">search</mat-icon>
        <input matInput (input)="onSearch($event)" placeholder="Search pages..." />
      </mat-form-field>

      <mat-form-field appearance="outline" class="filter-field">
        <mat-label>Status</mat-label>
        <mat-select (selectionChange)="onStatusFilter($event.value)" [value]="null">
          <mat-option [value]="null">All</mat-option>
          <mat-option [value]="true">Active</mat-option>
          <mat-option [value]="false">Inactive</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <div class="filter-right">
      <span class="showing-counter">
        Showing <strong>{{ items().length }}</strong> of <strong>{{ totalItems() }}</strong> pages
      </span>

      <button mat-raised-button color="primary" routerLink="/admin/pages/new" class="create-btn">
        <mat-icon>add</mat-icon>
        Create Page
      </button>
    </div>
  </div>

  <mat-card class="table-card">
    @if (state.isLoading()) {
      <div class="loading-container">
        <mat-spinner diameter="40"></mat-spinner>
      </div>
    }

    <table mat-table [dataSource]="items()" class="data-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let page">
          <span class="cell-name">{{ page.name }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="route_path">
        <th mat-header-cell *matHeaderCellDef>Route Path</th>
        <td mat-cell *matCellDef="let page">
          <code class="cell-secondary">{{ page.route_path }}</code>
        </td>
      </ng-container>

      <ng-container matColumnDef="display_order">
        <th mat-header-cell *matHeaderCellDef>Order</th>
        <td mat-cell *matCellDef="let page">
          <span class="cell-secondary">{{ page.display_order }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let page">
          <div class="status-indicator">
            <span class="status-dot" [class.status-dot--active]="page.is_active" [class.status-dot--inactive]="!page.is_active"></span>
            <span class="status-label" [class.status-label--active]="page.is_active" [class.status-label--inactive]="!page.is_active">
              {{ page.is_active ? 'Active' : 'Inactive' }}
            </span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="actions-header"></th>
        <td mat-cell *matCellDef="let page" class="actions-cell">
          <button
            mat-icon-button
            class="action-btn"
            [routerLink]="['/admin/pages', page.id, 'edit']"
            matTooltip="Edit page"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            class="action-btn action-btn--danger"
            (click)="handleDelete(page)"
            matTooltip="Delete page"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: displayedColumns()"
        [class.inactive-row]="!row.is_active"
      ></tr>
    </table>

    <mat-paginator
      [length]="totalItems()"
      [pageSize]="state.pageSize()"
      [pageIndex]="state.currentPage() - 1"
      [pageSizeOptions]="[5, 10, 15, 25]"
      (page)="onPageChange($event)"
      showFirstLastButtons
    ></mat-paginator>
  </mat-card>
</div>
